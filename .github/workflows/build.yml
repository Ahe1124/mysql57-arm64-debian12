name: Build MySQL 5.7 for Debian 12 aarch64

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  MYSQL_VERSION: "5.7.44"
  PACKAGE_BASENAME: "mysql-5.7.44-aarch64-debian12"

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    container:
      image: debian:bookworm

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            build-essential cmake make \
            libssl-dev libncurses5-dev libncurses-dev \
            libaio-dev libaio1 \
            libreadline-dev pkg-config \
            wget curl bzip2 xz-utils \
            libtirpc-dev rpcsvc-proto \
            gcc g++ perl \
            zlib1g-dev \
            libnuma-dev \
            libedit-dev \
            libldap2-dev \
            libsasl2-dev \
            libcurl4-openssl-dev \
            patchelf \
            jq

      - name: Download MySQL 5.7.44 source with boost
        run: |
          cd /tmp
          wget -q --show-progress \
            "https://cdn.mysql.com/archives/mysql-5.7/mysql-boost-${MYSQL_VERSION}.tar.gz"
          tar xzf "mysql-boost-${MYSQL_VERSION}.tar.gz"

      - name: Apply gcc12 compatibility patches
        run: |
          cd "/tmp/mysql-${MYSQL_VERSION}"
          sed -i 's/template<>/template <>/g' include/atomic_class.h 2>/dev/null || true
          find . \( -name "*.cc" -o -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/\bregister \([a-zA-Z]\)/\1/g' {} \; 2>/dev/null || true
          echo "Patches applied"

      - name: Build MySQL
        run: |
          cd "/tmp/mysql-${MYSQL_VERSION}"
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX="/tmp/mysql-${MYSQL_VERSION}-aarch64" \
            -DMYSQL_DATADIR=/www/server/data \
            -DSYSCONFDIR=/etc \
            -DMYSQL_UNIX_ADDR=/tmp/mysql.sock \
            -DWITH_BOOST="/tmp/mysql-${MYSQL_VERSION}/boost" \
            -DWITH_INNOBASE_STORAGE_ENGINE=1 \
            -DWITH_PARTITION_STORAGE_ENGINE=1 \
            -DWITH_FEDERATED_STORAGE_ENGINE=1 \
            -DWITH_BLACKHOLE_STORAGE_ENGINE=1 \
            -DWITH_MYISAM_STORAGE_ENGINE=1 \
            -DENABLED_LOCAL_INFILE=1 \
            -DENABLE_DTRACE=0 \
            -DWITH_EMBEDDED_SERVER=0 \
            -DWITH_SSL=system \
            -DWITH_ZLIB=system \
            -DDEFAULT_CHARSET=utf8mb4 \
            -DDEFAULT_COLLATION=utf8mb4_general_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_UNIT_TESTS=0 \
            -DCMAKE_C_FLAGS="-Wno-error -w" \
            -DCMAKE_CXX_FLAGS="-Wno-error -w -std=c++14" \
            -DCMAKE_EXE_LINKER_FLAGS="-lz"
          make -j$(nproc)
          make install

      - name: Verify build
        run: |
          test -f "/tmp/mysql-${MYSQL_VERSION}-aarch64/bin/mysqld" || { echo "mysqld not found!"; exit 1; }
          test -f "/tmp/mysql-${MYSQL_VERSION}-aarch64/bin/mysql"  || { echo "mysql not found!"; exit 1; }
          echo "Build verified OK"
          "/tmp/mysql-${MYSQL_VERSION}-aarch64/bin/mysqld" --version

      - name: Strip and package
        run: |
          find "/tmp/mysql-${MYSQL_VERSION}-aarch64/bin" -type f \
            -exec strip --strip-unneeded {} \; 2>/dev/null || true
          find "/tmp/mysql-${MYSQL_VERSION}-aarch64/lib" -name "*.so*" \
            -exec strip --strip-unneeded {} \; 2>/dev/null || true
          cd /tmp
          tar czf "${PACKAGE_BASENAME}.tar.gz" "mysql-${MYSQL_VERSION}-aarch64"
          ls -lh "${PACKAGE_BASENAME}.tar.gz"

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: /tmp/${{ env.PACKAGE_BASENAME }}.tar.gz
          retention-days: 7

      - name: Create GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          TAG="v${MYSQL_VERSION}"
          ASSET_NAME="${PACKAGE_BASENAME}.tar.gz"
          ASSET_PATH="/tmp/${ASSET_NAME}"
          UPLOAD_BASE="https://uploads.github.com/repos/${REPO}/releases"
          API_BASE="https://api.github.com/repos/${REPO}"
          AUTH_HEADER="Authorization: Bearer ${TOKEN}"
          ACCEPT_HEADER="Accept: application/vnd.github+json"

          test -f "${ASSET_PATH}" || { echo "asset not found: ${ASSET_PATH}"; exit 1; }

          RELEASE_JSON="$(curl -fsSL \
            -H "${AUTH_HEADER}" \
            -H "${ACCEPT_HEADER}" \
            "${API_BASE}/releases/tags/${TAG}" || true)"

          RELEASE_ID="$(echo "${RELEASE_JSON}" | jq -r '.id // empty')"

          if [ -z "${RELEASE_ID}" ]; then
            echo "Creating new release..."
            RELEASE_JSON="$(curl -fsSL -X POST \
              -H "${AUTH_HEADER}" \
              -H "${ACCEPT_HEADER}" \
              -H "Content-Type: application/json" \
              "${API_BASE}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"MySQL ${MYSQL_VERSION} aarch64 Debian 12 bookworm\",\"body\":\"MySQL ${MYSQL_VERSION} compiled natively on Debian 12 bookworm aarch64.\",\"draft\":false,\"prerelease\":false}")"
            RELEASE_ID="$(echo "${RELEASE_JSON}" | jq -r '.id // empty')"
          fi

          echo "Release ID: ${RELEASE_ID}"
          if [ -z "${RELEASE_ID}" ]; then
            echo "ERROR: Could not get release ID"
            exit 1
          fi

          # 如果已存在同名 asset，先删再传，避免 already_exists
          ASSET_ID="$(curl -fsSL \
            -H "${AUTH_HEADER}" \
            -H "${ACCEPT_HEADER}" \
            "${API_BASE}/releases/${RELEASE_ID}/assets" \
            | jq -r ".[] | select(.name==\"${ASSET_NAME}\") | .id" || true)"

          if [ -n "${ASSET_ID:-}" ]; then
            echo "Deleting existing asset id=${ASSET_ID}"
            curl -fsSL -X DELETE \
              -H "${AUTH_HEADER}" \
              -H "${ACCEPT_HEADER}" \
              "${API_BASE}/releases/assets/${ASSET_ID}" >/dev/null
          fi

          UPLOAD_URL="${UPLOAD_BASE}/${RELEASE_ID}/assets?name=${ASSET_NAME}"
          echo "Uploading to: ${UPLOAD_URL}"

          RESULT="$(curl -fsSL -X POST \
            -H "${AUTH_HEADER}" \
            -H "${ACCEPT_HEADER}" \
            -H "Content-Type: application/gzip" \
            "${UPLOAD_URL}" \
            --data-binary @"${ASSET_PATH}")"
          echo "Upload result: ${RESULT}"
          echo "${RESULT}" | grep -q '"state":"uploaded"' \
            && echo "Release published successfully!" \
            || { echo "Upload failed"; exit 1; }
