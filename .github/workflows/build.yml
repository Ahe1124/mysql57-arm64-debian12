name: Build MySQL 5.7 for Debian 12 aarch64

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    container:
      image: debian:bookworm

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            build-essential cmake make \
            libssl-dev libncurses5-dev libncurses-dev \
            libaio-dev libaio1 \
            libreadline-dev pkg-config \
            wget curl bzip2 xz-utils \
            libtirpc-dev rpcsvc-proto \
            gcc g++ perl \
            zlib1g-dev \
            libnuma-dev \
            libmecab-dev \
            libedit-dev \
            libevent-dev \
            libldap2-dev \
            libsasl2-dev \
            libcurl4-openssl-dev \
            liblz4-dev \
            libzstd-dev \
            patchelf

      - name: Download MySQL 5.7.44 source with boost
        run: |
          cd /tmp
          wget -q --show-progress \
            https://cdn.mysql.com/archives/mysql-5.7/mysql-boost-5.7.44.tar.gz
          tar xzf mysql-boost-5.7.44.tar.gz

      - name: Apply gcc12 compatibility patches
        run: |
          cd /tmp/mysql-5.7.44

          # Fix: 'uint' was not declared in this scope (missing includes)
          sed -i '1s/^/#include <cstdint>\n/' sql/item_cmpfunc.h 2>/dev/null || true

          # Fix: error in 'lex_string_t' / string.h conflicts with gcc12
          find . -name "*.cc" -o -name "*.h" | xargs grep -l "std::string" | head -5

          # Fix: 'my_bool' deprecated in newer builds - patch known problematic files
          # Fix atomic issues with gcc12
          sed -i 's/template<>/template <>/g' include/atomic_class.h 2>/dev/null || true

          # Fix: 'register' keyword removed in C++17
          find . \( -name "*.cc" -o -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/\bregister \([a-zA-Z]\)/\1/g' {} \; 2>/dev/null || true

          echo "Patches applied"

      - name: Build MySQL
        run: |
          cd /tmp/mysql-5.7.44
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=/tmp/mysql-5.7.44-aarch64 \
            -DMYSQL_DATADIR=/www/server/data \
            -DSYSCONFDIR=/etc \
            -DMYSQL_UNIX_ADDR=/tmp/mysql.sock \
            -DWITH_BOOST=/tmp/mysql-5.7.44/boost \
            -DWITH_INNOBASE_STORAGE_ENGINE=1 \
            -DWITH_PARTITION_STORAGE_ENGINE=1 \
            -DWITH_FEDERATED_STORAGE_ENGINE=1 \
            -DWITH_BLACKHOLE_STORAGE_ENGINE=1 \
            -DWITH_MYISAM_STORAGE_ENGINE=1 \
            -DENABLED_LOCAL_INFILE=1 \
            -DENABLE_DTRACE=0 \
            -DWITH_EMBEDDED_SERVER=0 \
            -DWITH_SSL=system \
            -DWITH_ZLIB=system \
            -DDEFAULT_CHARSET=utf8mb4 \
            -DDEFAULT_COLLATION=utf8mb4_general_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_UNIT_TESTS=0 \
            -DWITHOUT_TOKUDB=1 \
            -DWITHOUT_ROCKSDB=1 \
            -DWITHOUT_MROONGA=1 \
            -DWITHOUT_OQGRAPH=1 \
            -DWITHOUT_CONNECT=1 \
            -DCMAKE_C_FLAGS="-Wno-error -w" \
            -DCMAKE_CXX_FLAGS="-Wno-error -w -std=c++14" \
            -DCMAKE_EXE_LINKER_FLAGS="-lz"
          make -j$(nproc) 2>&1 | tail -50
          make install

      - name: Strip binaries and package
        run: |
          cd /tmp
          # Strip debug symbols to reduce size
          find mysql-5.7.44-aarch64/bin -type f -exec strip --strip-unneeded {} \; 2>/dev/null || true
          find mysql-5.7.44-aarch64/lib -name "*.so*" -exec strip --strip-unneeded {} \; 2>/dev/null || true

          tar czf mysql-5.7.44-aarch64-debian12.tar.gz mysql-5.7.44-aarch64
          ls -lh mysql-5.7.44-aarch64-debian12.tar.gz
          echo "MYSQL_DIR=$(ls -d /tmp/mysql-5.7.44-aarch64)" >> $GITHUB_ENV

      - name: Create Release and Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sL https://github.com/cli/cli/releases/download/v2.45.0/gh_2.45.0_linux_arm64.tar.gz \
            | tar xz -C /tmp
          /tmp/gh_2.45.0_linux_arm64/bin/gh release create v5.7.44 \
            /tmp/mysql-5.7.44-aarch64-debian12.tar.gz \
            --repo ${{ github.repository }} \
            --title "MySQL 5.7.44 aarch64 Debian 12 bookworm" \
            --notes "MySQL 5.7.44 compiled natively on Debian 12 (bookworm) aarch64. Unpack and move to /www/server/mysql." \
            --latest
