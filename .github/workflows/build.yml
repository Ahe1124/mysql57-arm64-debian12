name: Build MySQL 5.7 for Debian 12 aarch64

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    container:
      image: debian:bookworm

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            build-essential cmake make \
            libssl-dev libncurses5-dev libncurses-dev \
            libaio-dev libaio1 \
            libreadline-dev pkg-config \
            wget curl bzip2 xz-utils \
            libtirpc-dev rpcsvc-proto \
            gcc g++ perl \
            zlib1g-dev \
            libnuma-dev \
            libedit-dev \
            libldap2-dev \
            libsasl2-dev \
            libcurl4-openssl-dev \
            patchelf

      - name: Download MySQL 5.7.44 source with boost
        run: |
          cd /tmp
          wget -q --show-progress \
            https://cdn.mysql.com/archives/mysql-5.7/mysql-boost-5.7.44.tar.gz
          tar xzf mysql-boost-5.7.44.tar.gz

      - name: Apply gcc12 compatibility patches
        run: |
          cd /tmp/mysql-5.7.44
          sed -i 's/template<>/template <>/g' include/atomic_class.h 2>/dev/null || true
          find . \( -name "*.cc" -o -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's/\bregister \([a-zA-Z]\)/\1/g' {} \; 2>/dev/null || true
          echo "Patches applied"

      - name: Build MySQL
        run: |
          cd /tmp/mysql-5.7.44
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=/tmp/mysql-5.7.44-aarch64 \
            -DMYSQL_DATADIR=/www/server/data \
            -DSYSCONFDIR=/etc \
            -DMYSQL_UNIX_ADDR=/tmp/mysql.sock \
            -DWITH_BOOST=/tmp/mysql-5.7.44/boost \
            -DWITH_INNOBASE_STORAGE_ENGINE=1 \
            -DWITH_PARTITION_STORAGE_ENGINE=1 \
            -DWITH_FEDERATED_STORAGE_ENGINE=1 \
            -DWITH_BLACKHOLE_STORAGE_ENGINE=1 \
            -DWITH_MYISAM_STORAGE_ENGINE=1 \
            -DENABLED_LOCAL_INFILE=1 \
            -DENABLE_DTRACE=0 \
            -DWITH_EMBEDDED_SERVER=0 \
            -DWITH_SSL=system \
            -DWITH_ZLIB=system \
            -DDEFAULT_CHARSET=utf8mb4 \
            -DDEFAULT_COLLATION=utf8mb4_general_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_UNIT_TESTS=0 \
            -DCMAKE_C_FLAGS="-Wno-error -w" \
            -DCMAKE_CXX_FLAGS="-Wno-error -w -std=c++14" \
            -DCMAKE_EXE_LINKER_FLAGS="-lz"
          make -j$(nproc)
          make install

      - name: Verify build
        run: |
          test -f /tmp/mysql-5.7.44-aarch64/bin/mysqld || { echo "mysqld not found!"; exit 1; }
          test -f /tmp/mysql-5.7.44-aarch64/bin/mysql  || { echo "mysql not found!"; exit 1; }
          echo "Build verified OK"
          /tmp/mysql-5.7.44-aarch64/bin/mysqld --version

      - name: Strip and package
        run: |
          find /tmp/mysql-5.7.44-aarch64/bin -type f \
            -exec strip --strip-unneeded {} \; 2>/dev/null || true
          find /tmp/mysql-5.7.44-aarch64/lib -name "*.so*" \
            -exec strip --strip-unneeded {} \; 2>/dev/null || true
          cd /tmp
          tar czf mysql-5.7.44-aarch64-debian12.tar.gz mysql-5.7.44-aarch64
          ls -lh mysql-5.7.44-aarch64-debian12.tar.gz

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: mysql-5.7.44-aarch64-debian12
          path: /tmp/mysql-5.7.44-aarch64-debian12.tar.gz
          retention-days: 7

      - name: Create GitHub Release
        run: |
          # 检查 release 是否已存在
          EXISTING=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v5.7.44")
          UPLOAD_URL=$(echo "$EXISTING" | grep -o '"upload_url":"[^"]*"' | sed 's/"upload_url":"//;s/".*//' | sed 's/{.*//')

          if [ -z "$UPLOAD_URL" ]; then
            echo "Creating new release..."
            RELEASE=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/${{ github.repository }}/releases \
              -d '{
                "tag_name": "v5.7.44",
                "name": "MySQL 5.7.44 aarch64 Debian 12 bookworm",
                "body": "MySQL 5.7.44 compiled natively on Debian 12 (bookworm) aarch64.\n\nInstall: unpack and move to /www/server/mysql",
                "draft": false,
                "prerelease": false
              }')
            echo "Create response: $RELEASE"
            UPLOAD_URL=$(echo "$RELEASE" | grep -o '"upload_url":"[^"]*"' | sed 's/"upload_url":"//;s/".*//' | sed 's/{.*//')
          else
            echo "Release already exists, reusing upload URL"
          fi

          echo "Upload URL: $UPLOAD_URL"
          if [ -z "$UPLOAD_URL" ]; then
            echo "ERROR: Could not get upload URL"
            exit 1
          fi

          # 上传包
          RESULT=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            "${UPLOAD_URL}?name=mysql-5.7.44-aarch64-debian12.tar.gz" \
            --data-binary @/tmp/mysql-5.7.44-aarch64-debian12.tar.gz)
          echo "Upload response: $RESULT"
          echo "$RESULT" | grep -q '"state":"uploaded"' && echo "Release published successfully!" || { echo "Upload may have failed"; exit 1; }
